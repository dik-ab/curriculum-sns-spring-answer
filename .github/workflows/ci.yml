name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Unit tests
        run: ./mvnw test

      - name: Build
        run: ./mvnw -DskipTests package

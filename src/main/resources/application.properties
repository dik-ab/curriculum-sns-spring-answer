spring.application.name=curriculum-sns-spring-answer
server.port=8000

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/curriculum_sns_spring}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
socketio.enabled=${SOCKET_IO_ENABLED:true}
socketio.port=${SOCKET_IO_PORT:8001}
